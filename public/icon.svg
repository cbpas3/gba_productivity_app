    <rect x="168" y="180" width="24" height="24"/>
    <rect x="192" y="204" width="24" height="24"/>
    <rect x="216" y="228" width="24" height="24"/>
    <rect x="240" y="204" width="24" height="24"/>
    <rect x="264" y="180" width="24" height="24"/>
    <rect x="288" y="156" width="24" height="24"/>
