  </g>
  <!-- D-pad -->
  <rect x="108" y="330" width="72" height="24" rx="4" fill="#4c1d95"/>
  <rect x="120" y="318" width="48" height="48" rx="4" fill="#0000" stroke="none"/>
  <rect x="132" y="306" width="24" height="72" rx="4" fill="#4c1d95"/>
